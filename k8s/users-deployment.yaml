apiVersion: apps/v1
kind: Deployment
metadata:
  name: users-api
  namespace: fiapstore
  labels:
    app: users-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: users-api
  template:
    metadata:
      labels:
        app: users-api
    spec:
      initContainers:
        - name: wait-for-users-db
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for users-db:5432..."
              until nc -z users-db 5432; do
                echo "users-db not ready yet, sleeping 3s..."
                sleep 3
              done
              echo "users-db is up."
      containers:
        - name: users-api
          image: DOCKERHUB_USER/users-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: users-config
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: users-secret
                  key: ConnectionStrings__DefaultConnection
            - name: Jwt__Key
              valueFrom:
                secretKeyRef:
                  name: users-secret
                  key: Jwt__Key
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
