services:
  users-db:
    image: postgres:16
    container_name: user_db_postgres
    environment:
      POSTGRES_DB: Db.Users
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
    ports:
      - "5439:5432"
    volumes:
      - users_pg_data:/var/lib/postgresql/data
    networks:
      - microsservicos-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d Db.Users" ]
      interval: 10s
      timeout: 5s
      retries: 10

  users-api:
    depends_on:
        users-db:
          condition: service_healthy
    
volumes:
  users_pg_data:

networks:
  microsservicos-net:
    name: app-network
    driver: bridge